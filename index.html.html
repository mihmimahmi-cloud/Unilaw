<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กรอกออเดอร์เสื้อ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; max-width: 640px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h2 { color: #1D9E75; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 12px;
    }
    .item-row {
      display: grid; grid-template-columns: 2fr 1fr 1fr 0.7fr auto;
      gap: 8px; align-items: center; margin-bottom: 8px;
    }
    .item-row input, .item-row select { margin-bottom: 0; }
    .btn-remove { background: #fee2e2; border: none; border-radius: 8px;
      color: #dc2626; padding: 8px 10px; cursor: pointer; font-size: 16px; }
    .btn-add { background: #f0fdf4; border: 1px dashed #1D9E75; color: #1D9E75;
      border-radius: 8px; padding: 8px 16px; cursor: pointer; width: 100%; margin-bottom: 16px; }
    .btn-submit { background: #1D9E75; color: white; border: none;
      border-radius: 8px; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
    #msg { text-align: center; margin-top: 12px; font-size: 14px; }
    .header-row { display: grid; grid-template-columns: 2fr 1fr 1fr 0.7fr auto;
      gap: 8px; margin-bottom: 4px; }
    .header-row span { font-size: 12px; color: #888; }
  </style>
</head>
<body>
<div class="card">
  <h2>📋 กรอกออเดอร์เสื้อ</h2>

  <label>ชื่อผู้สั่ง</label>
  <input type="text" id="buyer" placeholder="ชื่อลูกค้า">

  <label>ยอดที่ต้องเก็บ</label>
  <input type="text" id="phone" placeholder="ยอดXXXXX">

  <label>รายการสินค้า</label>
  <div class="header-row">
    <span>แบบเสื้อ</span><span>สี</span><span>ไซส์</span><span>จำนวน</span><span></span>
  </div>
  <div id="items"></div>

  <button class="btn-add" onclick="addItem()">+ เพิ่มรายการ</button>

      <label>วิธีชำระเงิน</label>
  <textarea id="note" rows="2" placeholder="เช่น โอนแล้ว, ปลายทาง "></textarea>

  <button class="btn-submit" id="submitBtn" onclick="submitOrder()">✅ บันทึกออเดอร์</button>
  <div id="msg"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhLWrOF5BQUkdkG-JtgxDvrQlg3dewZFccRFgELT85MeEFWvLbWP3YK6Ag3cxL4lcHng/exec';

  // ข้อมูลสินค้า — แก้ได้ตามต้องการ
  const STYLES = ['แบบรุ่นครุยเนติ', 'แบบรุ่นโลโก้ปักอก'];
  const COLORS = ['ดำ', 'ขาว', 'กรม', 'กรมท่า', 'แดง'];
  const SIZES  = ['S', 'M', 'L', 'XL', '2XL', '3XL', '4XL', '5XL'];

  function makeOptions(arr) {
    return arr.map(v => `<option>${v}</option>`).join('');
  }

  function addItem() {
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <select class="i-style">${makeOptions(STYLES)}</select>
      <select class="i-color">${makeOptions(COLORS)}</select>
      <select class="i-size">${makeOptions(SIZES)}</select>
      <input type="number" class="i-qty" value="1" min="1">
      <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>
    `;
    document.getElementById('items').appendChild(div);
  }

  async function submitOrder() {
    const buyer = document.getElementById('buyer').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const note  = document.getElementById('note').value.trim();

    if (!buyer) return alert('กรุณากรอกชื่อผู้สั่ง');

    const rows = document.querySelectorAll('.item-row');
    if (rows.length === 0) return alert('กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ');

    const items = [];
    rows.forEach(row => {
      items.push({
        style: row.querySelector('.i-style').value,
        color: row.querySelector('.i-color').value,
        size:  row.querySelector('.i-size').value,
        qty:   row.querySelector('.i-qty').value
      });
    });

    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';
    msg.textContent = '';

    try {
      const res  = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({buyer, phone, note, items}) });
      const text = await res.text();
      const data = JSON.parse(text);

      if (data.status === 'ok') {
        msg.style.color = '#1D9E75';
        msg.textContent = '✅ บันทึกออเดอร์เรียบร้อยแล้ว!';
        // เคลียร์ฟอร์ม
        document.getElementById('buyer').value = '';
        document.getElementById('phone').value = '';
                document.getElementById('note').value  = '';
        document.getElementById('items').innerHTML = '';
        addItem();
      } else {
        throw new Error(data.message);
      }
    } catch(err) {
      msg.style.color = '#dc2626';
      msg.textContent = '❌ เกิดข้อผิดพลาด: ' + err.message;
    }

    btn.disabled = false;
    btn.textContent = '✅ บันทึกออเดอร์';
  }

  // เพิ่มรายการแรกอัตโนมัติ
  addItem();
</script>
</body>
</html>
